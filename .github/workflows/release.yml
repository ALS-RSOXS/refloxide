name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  linux:
    name: Build Linux (${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --compatibility pypi --find-interpreter
          manylinux: "2_28"

      - name: Assert manylinux wheel tags
        run: |
          python - <<'PY'
          import glob
          import sys

          wheels = sorted(glob.glob("dist/*.whl"))
          if not wheels:
              sys.exit("no wheel in dist/")
          for path in wheels:
              name = path.rsplit("/", 1)[-1]
              if name.endswith("linux_x86_64.whl") or name.endswith("linux_aarch64.whl"):
                  sys.exit(f"unsupported platform tag in {name}")
              if "manylinux" not in name and "musllinux" not in name:
                  sys.exit(f"expected manylinux/musllinux tag in {name}")
              print(f"OK: {name}")
          PY

      - name: Smoke import (x86_64 host only)
        if: matrix.platform.target == 'x86_64'
        run: |
          python -m venv .smoke-venv
          .smoke-venv/bin/pip install --no-deps dist/*.whl
          .smoke-venv/bin/python -c "import refloxide; import refloxide.rust; print(refloxide.__version__)"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist/*

  macos:
    name: Build macOS (${{ matrix.platform.target }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: >-
            --release --out dist --compatibility pypi
            -i python${{ matrix.python-version }}

      - name: Smoke import
        run: |
          python -m venv .smoke-venv
          .smoke-venv/bin/pip install --no-deps dist/*.whl
          .smoke-venv/bin/python -c "import refloxide; import refloxide.rust; print(refloxide.__version__)"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}-py${{ matrix.python-version }}
          path: dist/*

  windows:
    name: Build Windows (x64, py${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: >-
            --release --out dist --compatibility pypi
            -i python${{ matrix.python-version }}

      - name: Smoke import
        shell: bash
        run: |
          python -m venv .smoke-venv
          .smoke-venv/Scripts/pip install --no-deps dist/*.whl
          .smoke-venv/Scripts/python -c "import refloxide; import refloxide.rust; print(refloxide.__version__)"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64-py${{ matrix.python-version }}
          path: dist/*

  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Build source distribution
        run: uv build --sdist -o dist --clear

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist/*

  publish-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, macos, windows, sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/refloxide
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: List distributions
        run: ls -la dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: false

  github-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [publish-pypi]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: dist/*
          generate_release_notes: false
