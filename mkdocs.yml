site_name: "als-rsoxs: refloxide"
site_description: A blaxingly fast 4x4 transfer matrix method for simulating reflection though stratified media
site_url: https://als-rsoxs.github.io/refloxide/
repo_url: https://github.com/als-rsoxs/refloxide
repo_name: als-rsoxs/refloxide
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/als-logo.png
  favicon: assets/als-favicon-32x32.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_toc_entry: true
            docstring_style: google
            merge_init_into_class: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/als.css

nav:
  - Home: index.md
  - Theory:
      - Overview: theory/overview.md
      - Narrative context:
          - History: theory/history.md
          - Pipeline at a glance: theory/pipeline.md
      - Core pipeline:
          - Foundations: theory/foundations.md
          - Eigenmode analysis: theory/eigenmode_analysis.md
          - Interface matrices: theory/interface_matrices.md
          - Propagation and assembly: theory/propagation_and_assembly.md
          - Reflection and transmission: theory/reflection_transmission.md
          - Electric field distribution: theory/electric_field_distribution.md
      - Roughness models:
          - Framework: theory/roughness_framework.md
          - Nevot-Croce: theory/roughness_nevot_croce.md
          - Debye-Waller: theory/roughness_debye_waller.md
          - Graded interface: theory/roughness_graded_interface.md
          - Selection guide: theory/roughness_selection_guide.md
  - API examples:
      - Overview: api_examples/overview.md
      - Structure definition: api_examples/structure_definition.md
      - Material parameterizations: api_examples/material_parameterizations.md
      - Single-coordinate simulation: api_examples/single_scan.md
      - Vectorized and batched simulation: api_examples/batched_scans.md
      - Roughness configuration: api_examples/roughness_configuration.md
  - API Reference: api.md
  - Contributing: contributing.md
