site_name: "als-rsoxs - refloxide"
site_description: A blaxingly fast 4x4 transfer matrix method for simulating reflection though stratified media
site_url: https://als-rsoxs.github.io/refloxide/
repo_url: https://github.com/als-rsoxs/refloxide
repo_name: als-rsoxs/refloxide
edit_uri: edit/main/docs/

hooks:
  - hooks.py

not_in_nav: |
  rustdoc/**

extra:
  als_group:
    full_name: ALS RSOXS Group Project
    acronym: REIXS
    github_url: https://github.com/als-rsoxs
    reixs_url: https://als.lbl.gov/science/photon-science-programs/rixs-program/

theme:
  name: rsoxs
  show_title: true
  show_stargazers: true
  topbar_sections: false
  katex_options:
    throwOnError: false
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow

plugins:
  - rsoxs
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            show_source: true
            show_root_heading: true
            show_root_toc_entry: true
            show_submodules: false
            docstring_style: numpy
            merge_init_into_class: true
            preload_modules:
              - refloxide._core

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      css_class: codehilite
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Theory:
      - Overview: theory/overview.md
      - Narrative context:
          - History: theory/history.md
          - Pipeline at a glance: theory/pipeline.md
      - Core pipeline:
          - Foundations: theory/foundations.md
          - Eigenmode analysis: theory/eigenmode_analysis.md
          - Interface matrices: theory/interface_matrices.md
          - Propagation and assembly: theory/propagation_and_assembly.md
          - Reflection and transmission: theory/reflection_transmission.md
          - Electric field distribution: theory/electric_field_distribution.md
      - Algorithm audit: theory/algorithm_audit.md
      - Roughness models:
          - Framework: theory/roughness_framework.md
          - Nevot-Croce: theory/roughness_nevot_croce.md
          - Debye-Waller: theory/roughness_debye_waller.md
          - Graded interface: theory/roughness_graded_interface.md
          - Selection guide: theory/roughness_selection_guide.md
  - API examples:
      - Overview: api_examples/overview.md
      - Structure definition: api_examples/structure_definition.md
      - Material parameterizations: api_examples/material_parameterizations.md
      - Single-coordinate simulation: api_examples/single_scan.md
      - Vectorized and batched simulation: api_examples/batched_scans.md
      - Roughness configuration: api_examples/roughness_configuration.md
  - API Reference:
      - Overview: api/index.md
      - Python:
          - refloxide: api/python/refloxide.md
          - pxr: api/python/pxr/index.md
          - tjf4x4: api/python/pxr/tjf4x4.md
      - Rust (_core): api/rust.md
  - Contributing: contributing.md
